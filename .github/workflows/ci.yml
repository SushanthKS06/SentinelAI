name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          
      - name: Run Ruff
        run: ruff check sentinelai/
        
      - name: Run MyPy
        run: mypy sentinelai/ --no-error-summary
        
      - name: Run Bandit
        run: bandit -r sentinelai/ -x sentinelai/tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sentinelai_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          
      - name: Run pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: sentinelai_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          pytest tests/ -v --cov=sentinelai --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          
      - name: Run MyPy
        run: mypy sentinelai/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run pip-audit
        run: pip-audit || true
        
      - name: Run Safety
        run: safety check || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, typecheck]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker images
        run: |
          docker build -t sentinelai/api-gateway:latest -f backend/Dockerfile backend/
          docker build -t sentinelai/auth-service:latest -f backend/Dockerfile backend/
          docker build -t sentinelai/incident-intelligence:latest -f backend/Dockerfile backend/
          docker build -t sentinelai/log-processing:latest -f backend/Dockerfile backend/
          docker build -t sentinelai/metrics-processing:latest -f backend/Dockerfile backend/
          docker build -t sentinelai/trace-correlation:latest -f backend/Dockerfile backend/
          docker build -t sentinelai/ai-orchestration:latest -f backend/Dockerfile backend/
          
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
        
      - name: Run Type Check
        working-directory: ./frontend
        run: npm run type-check
