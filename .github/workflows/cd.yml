name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push images
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:staging -f backend/Dockerfile backend/
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:staging
          
      - name: Deploy to Staging
        run: |
          kubectl config use-context staging
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:staging -n sentinelai-staging

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push images
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:latest -f backend/Dockerfile backend/
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:$(git rev-parse --short HEAD) -f backend/Dockerfile backend/
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:$(git rev-parse --short HEAD)
          
      - name: Deploy to Production
        run: |
          kubectl config use-context production
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:latest -n sentinelai-production
          kubectl rollout status deployment/api-gateway -n sentinelai-production --timeout=300s

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: Wait for deployment
        run: sleep 30
        
      - name: Health check
        run: |
          curl -f https://sentinelai.example.com/health || exit 1
          
      - name: Run integration tests
        run: |
          pytest tests/e2e/ -v

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests]
    if: always()
    steps:
      - name: Send notification
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "Deployment failed - sending Slack notification"
          # Add Slack notification logic here
