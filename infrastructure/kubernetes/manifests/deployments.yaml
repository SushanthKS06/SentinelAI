apiVersion: v1
kind: Namespace
metadata:
  name: sentinelai
  labels:
    name: sentinelai
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelai-config
  namespace: sentinelai
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinelai-secrets
  namespace: sentinelai
type: Opaque
stringData:
  POSTGRES_PASSWORD: "changeme"
  REDIS_PASSWORD: ""
  JWT_SECRET_KEY: "changeme-jwt-secret-replace-in-production"
  SECRET_KEY: "changeme-secret-key-replace-in-production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sentinelai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: api-gateway
        image: ghcr.io/sentinelai/sentinelai/api-gateway:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: sentinelai-config
        - secretRef:
            name: sentinelai-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sentinelai
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sentinelai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: ghcr.io/sentinelai/sentinelai/api-gateway:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: sentinelai-config
        - secretRef:
            name: sentinelai-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sentinelai
spec:
  selector:
    app: auth-service
  ports:
  - port: 8001
    targetPort: 8001
---
